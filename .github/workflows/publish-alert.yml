name: Publish daily neurology literature alert

on:
  schedule:
    # Pre-wake at 07:15 Asia/Taipei, then wait in the runner until 07:30.
    - cron: "15 23 * * *"
    # Exact target plus staggered retries. Scheduled events can be delayed or
    # dropped by GitHub, so every run is idempotent.
    - cron: "30 23 * * *"
    - cron: "35 23 * * *"
    - cron: "50 23 * * *"
    - cron: "5 0 * * *"
    - cron: "20 0 * * *"
    - cron: "15 1 * * *"
    # Cloud watchdog: 04:05 UTC = 12:05 Asia/Taipei.
    - cron: "5 4 * * *"
  workflow_dispatch:
    inputs:
      smoke_test:
        description: Test GitHub Models without publishing an issue
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  models: read

concurrency:
  group: neurology-literature-alert-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for 07:30 publish window
        if: github.event_name == 'schedule'
        run: python scripts/wait_for_publish_window.py

      - name: Test GitHub Models
        if: github.event_name == 'workflow_dispatch' && inputs.smoke_test
        run: python scripts/cloud_publish.py --ai-smoke-test
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate verified alert
        if: github.event_name != 'workflow_dispatch' || !inputs.smoke_test
        id: generate
        run: python scripts/cloud_publish.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_MODELS_MODEL: openai/gpt-4.1

      - name: Commit and push when data changed
        if: github.event_name != 'workflow_dispatch' || !inputs.smoke_test
        run: |
          if [ -z "$(git status --porcelain -- data/alerts.json data/alerts.js knowledge-notes)" ]; then
            echo "No alert changes."
            exit 0
          fi
          git config user.name "neurology-alert-bot"
          git config user.email "codex-automation@users.noreply.github.com"
          git add data/alerts.json data/alerts.js knowledge-notes
          git commit -m "Publish ${ISSUE_DATE} neurology literature alert"
          git push
        env:
          ISSUE_DATE: ${{ steps.generate.outputs.issue_date }}
