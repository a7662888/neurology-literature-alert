name: Publish daily neurology literature alert

on:
  schedule:
    # Asia/Taipei is UTC+8 year-round: 23:30 UTC = 07:30 next day.
    - cron: "30 23 * * *"
    # Cloud watchdog: 04:00 UTC = 12:00 Asia/Taipei.
    - cron: "0 4 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neurology-literature-alert-publisher
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate verified alert
        id: generate
        run: python scripts/cloud_publish.py

      - name: Commit and push when data changed
        run: |
          if git diff --quiet -- data/alerts.json data/alerts.js; then
            echo "No alert changes."
            exit 0
          fi
          git config user.name "neurology-alert-bot"
          git config user.email "codex-automation@users.noreply.github.com"
          git add data/alerts.json data/alerts.js
          git commit -m "Publish ${ISSUE_DATE} neurology literature alert"
          git push
        env:
          ISSUE_DATE: ${{ steps.generate.outputs.issue_date }}
